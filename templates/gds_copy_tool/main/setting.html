{% extends 'base.html' %}
{% block title %}GDS 배치 복사{% endblock %}

{% block page_content %}
<style>
:root {
  --bg0: #11111b;
  --bg1: #1e1e2e;
  --bg2: #181825;
  --bg3: #313244;
  --bg4: #45475a;
  --fg:  #cdd6f4;
  --fg2: #a6adc8;
  --fg3: #585b70;
  --blue:   #89b4fa;
  --green:  #a6e3a1;
  --yellow: #f9e2af;
  --red:    #f38ba8;
  --teal:   #94e2d5;
}

body { background: var(--bg0); color: var(--fg); }

.gct-card {
  background: var(--bg1);
  border: 1px solid var(--bg3);
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 16px;
}
.gct-card h5 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .6px;
  color: var(--blue);
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--bg3);
}

.form-label { font-size: 11px; color: var(--fg3); margin-bottom: 4px; letter-spacing: .3px; }
.form-control, .form-control:focus {
  background: var(--bg2);
  border: 1px solid var(--bg3);
  color: var(--fg);
  font-size: 13px;
  border-radius: 6px;
}
.form-control:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 2px rgba(137,180,250,.12);
}
.form-control::placeholder { color: var(--fg3); }

.btn { border-radius: 6px; font-size: 12px; font-weight: 600; padding: 5px 14px; border: none; }
.btn-blue   { background: var(--blue);   color: var(--bg0); }
.btn-blue:hover   { background: var(--teal); color: var(--bg0); }
.btn-green  { background: var(--green);  color: var(--bg0); }
.btn-green:hover  { background: #b9f7b5; color: var(--bg0); }
.btn-red    { background: var(--red);    color: var(--bg0); }
.btn-red:hover    { background: #fbb8c8; color: var(--bg0); }
.btn-gray   { background: var(--bg4);    color: var(--fg2); }
.btn-gray:hover   { background: var(--fg3); color: var(--fg); }

/* 진행 통계 */
.stat-row { display: flex; gap: 12px; margin-bottom: 14px; }
.stat-box {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}
.stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--fg3); margin-top: 4px; letter-spacing: .4px; text-transform: uppercase; }

/* 진행바 */
.gct-progress { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
.gct-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--teal));
  border-radius: 4px;
  transition: width .5s ease;
}

/* 상태 배지 */
.badge-run  { background: var(--green);  color: var(--bg0); font-size: 10px; padding: 2px 9px; border-radius: 10px; font-weight: 700; }
.badge-idle { background: var(--bg4);    color: var(--fg2); font-size: 10px; padding: 2px 9px; border-radius: 10px; font-weight: 700; }

/* 로그박스 */
#log-box {
  background: var(--bg0);
  border: 1px solid var(--bg3);
  border-radius: 8px;
  font-family: 'Courier New', monospace;
  font-size: 11.5px;
  height: 360px;
  overflow-y: auto;
  padding: 12px 14px;
  line-height: 1.6;
}
.log-INFO  { color: var(--fg2); }
.log-WARN  { color: var(--yellow); }
.log-ERROR { color: var(--red); }

/* 미리보기 테이블 */
.gct-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.gct-table th {
  background: var(--bg2);
  color: var(--blue);
  font-size: 11px;
  letter-spacing: .4px;
  text-transform: uppercase;
  padding: 8px 10px;
  border-bottom: 1px solid var(--bg3);
  text-align: left;
}
.gct-table td {
  color: var(--fg2);
  padding: 7px 10px;
  border-bottom: 1px solid var(--bg3);
  vertical-align: middle;
}
.gct-table tr:last-child td { border-bottom: none; }
.gct-table-wrap {
  background: var(--bg0);
  border: 1px solid var(--bg3);
  border-radius: 8px;
  overflow: hidden;
  max-height: 280px;
  overflow-y: auto;
}
</style>

<div class="container-fluid py-3" style="max-width:960px;">

  <!-- ① NAS 설정 -->
  <div class="gct-card">
    <h5>⚙ NAS 연결 설정</h5>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">NAS IP</label>
        <input type="text" class="form-control" id="main_nas_ip"
               value="{{P.ModelSetting.get('main_nas_ip')}}" placeholder="192.168.1.xxx">
      </div>
      <div class="col-md-2">
        <label class="form-label">SSH Port</label>
        <input type="number" class="form-control" id="main_nas_port"
               value="{{P.ModelSetting.get('main_nas_port') or '22'}}">
      </div>
      <div class="col-md-3">
        <label class="form-label">SSH User</label>
        <input type="text" class="form-control" id="main_nas_user"
               value="{{P.ModelSetting.get('main_nas_user')}}" placeholder="admin">
      </div>
      <div class="col-md-3">
        <label class="form-label">SSH Password <span style="color:var(--fg3)">(변경 시만 입력)</span></label>
        <input type="password" class="form-control" id="main_nas_password_plain" placeholder="••••••••">
      </div>
      <div class="col-md-6">
        <label class="form-label">rclone_move.sh 경로</label>
        <input type="text" class="form-control" id="main_script_path"
               value="{{P.ModelSetting.get('main_script_path') or '/volume1/MK/rclone_move.sh'}}">
      </div>
      <div class="col-md-6">
        <label class="form-label">내 드라이브 Remote 경로 (polling 대상)</label>
        <input type="text" class="form-control" id="main_gdrive_remote"
               value="{{P.ModelSetting.get('main_gdrive_remote') or 'GDG:/Downloads'}}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Polling 간격 (초)</label>
        <input type="number" class="form-control" id="main_poll_interval"
               value="{{P.ModelSetting.get('main_poll_interval') or '30'}}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Polling 타임아웃 (초)</label>
        <input type="number" class="form-control" id="main_poll_timeout"
               value="{{P.ModelSetting.get('main_poll_timeout') or '3600'}}">
      </div>
    </div>
    <div class="mt-3 d-flex gap-2 flex-wrap">
      <button class="btn btn-blue" onclick="saveSetting()">💾 저장</button>
      <button class="btn btn-gray" onclick="testSSH()">🔌 SSH 연결 테스트</button>
    </div>
  </div>

  <!-- ② 배치 실행 -->
  <div class="gct-card">
    <h5>🚀 배치 실행</h5>
    <div class="row g-3 align-items-end">
      <div class="col-md-7">
        <label class="form-label">공유드라이브 폴더 ID</label>
        <input type="text" class="form-control" id="batch_folder_id"
               placeholder="1KUXnRGTMm0z9HcotQxuhCmMi_PubKjOO">
      </div>
      <div class="col-md-5 d-flex gap-2 flex-wrap">
        <button class="btn btn-gray" onclick="previewFiles()">🔍 미리보기</button>
        <button class="btn btn-green" id="btn-start" onclick="startBatch()">▶ 배치 시작</button>
        <button class="btn btn-red"   id="btn-stop"  onclick="stopBatch()" disabled>⏹ 중단</button>
      </div>
    </div>

    <div id="preview-wrap" class="mt-3" style="display:none;">
      <div class="gct-table-wrap">
        <table class="gct-table">
          <thead>
            <tr><th>#</th><th>파일명</th><th>크기</th><th>MimeType</th></tr>
          </thead>
          <tbody id="preview-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ③ 진행 상태 -->
  <div class="gct-card" id="progress-wrap" style="display:none;">
    <h5>
      📊 진행 상태
      <span id="badge-status" class="badge-idle ms-2">대기중</span>
    </h5>
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-num" id="stat-total" style="color:var(--fg)">0</div>
        <div class="stat-lbl">전체</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-done" style="color:var(--green)">0</div>
        <div class="stat-lbl">완료</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-failed" style="color:var(--red)">0</div>
        <div class="stat-lbl">실패</div>
      </div>
    </div>
    <div class="gct-progress mb-2">
      <div class="gct-progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div id="current-file" style="font-size:12px; color:var(--fg3); min-height:18px;"></div>
  </div>

  <!-- ④ 로그 -->
  <div class="gct-card">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5 class="mb-0">📋 로그</h5>
      <button class="btn btn-gray btn-sm" onclick="clearLog()">🗑 지우기</button>
    </div>
    <div id="log-box"></div>
  </div>

</div>

<script>
var socket = io.connect('/framework');

// ── socketio 수신 ────────────────────────────────
socket.on('gds_copy_log', function(d) {
  appendLog(d.ts, d.level, d.msg);
});
socket.on('gds_copy_progress', function(d) {
  updateProgress(d);
});
socket.on('gds_copy_done', function(d) {
  updateProgress(d);
  setBadge(false);
  setButtons(false);
  appendLog(now(), 'INFO', '배치 작업 종료');
});

// ── 설정 저장 ────────────────────────────────────
function saveSetting() {
  var data = {
    main_nas_ip:            $('#main_nas_ip').val(),
    main_nas_port:          $('#main_nas_port').val(),
    main_nas_user:          $('#main_nas_user').val(),
    main_nas_password_plain:$('#main_nas_password_plain').val(),
    main_script_path:       $('#main_script_path').val(),
    main_poll_interval:     $('#main_poll_interval').val(),
    main_poll_timeout:      $('#main_poll_timeout').val(),
    main_gdrive_remote:     $('#main_gdrive_remote').val(),
  };
  command('save_setting', '', '', '', data, function(ret) {
    alert(ret.msg);
    if (ret.ret === 'success') $('#main_nas_password_plain').val('');
  });
}

// ── SSH 테스트 ───────────────────────────────────
function testSSH() {
  appendLog(now(), 'INFO', 'SSH 연결 테스트 중...');
  command('test_ssh', '', '', '', {}, function(ret) {
    appendLog(now(), ret.ret === 'success' ? 'INFO' : 'ERROR', ret.msg);
    alert(ret.msg);
  });
}

// ── 미리보기 ─────────────────────────────────────
function previewFiles() {
  var fid = $('#batch_folder_id').val().trim();
  if (!fid) { alert('폴더 ID를 입력하세요.'); return; }
  command('preview_files', fid, '', '', {}, function(ret) {
    if (ret.ret !== 'success') { alert(ret.msg); return; }
    var tbody = $('#preview-tbody').empty();
    var files = ret.files || [];
    if (files.length === 0) {
      tbody.append('<tr><td colspan="4" style="text-align:center;color:var(--fg3)">비디오 파일 없음</td></tr>');
    } else {
      files.forEach(function(f, i) {
        var mb = f.Size > 0 ? (f.Size / 1024 / 1024).toFixed(0) + ' MB' : '-';
        tbody.append('<tr><td>' + (i+1) + '</td><td>' + escHtml(f.Name) + '</td><td>' + mb + '</td><td>' + f.MimeType + '</td></tr>');
      });
    }
    $('#preview-wrap').show();
    alert(ret.msg);
  });
}

// ── 배치 시작/중단 ───────────────────────────────
function startBatch() {
  var fid = $('#batch_folder_id').val().trim();
  if (!fid) { alert('폴더 ID를 입력하세요.'); return; }
  command('start_batch', fid, '', '', {}, function(ret) {
    alert(ret.msg);
    if (ret.ret === 'success') {
      setBadge(true);
      setButtons(true);
      $('#progress-wrap').show();
    }
  });
}

function stopBatch() {
  command('stop_batch', '', '', '', {}, function(ret) {
    alert(ret.msg);
  });
}

// ── 진행 상태 업데이트 ───────────────────────────
function updateProgress(d) {
  var total = d.total  || 0;
  var done  = d.done   || 0;
  var fail  = d.failed || 0;
  var pct   = total > 0 ? Math.round((done + fail) / total * 100) : 0;
  $('#stat-total').text(total);
  $('#stat-done').text(done);
  $('#stat-failed').text(fail);
  $('#progress-bar').css('width', pct + '%');
  if (d.current) {
    var idx = d.index && total ? ' (' + d.index + '/' + total + ')' : '';
    $('#current-file').text('처리중: ' + d.current + idx);
  } else {
    $('#current-file').text('');
  }
}

function setBadge(run) {
  var b = $('#badge-status');
  b.attr('class', run ? 'badge-run ms-2' : 'badge-idle ms-2').text(run ? '실행중' : '대기중');
}
function setButtons(run) {
  $('#btn-start').prop('disabled', run);
  $('#btn-stop').prop('disabled', !run);
}

// ── 로그 ─────────────────────────────────────────
function appendLog(ts, level, msg) {
  var box = document.getElementById('log-box');
  var div = document.createElement('div');
  div.className = 'log-' + level;
  div.textContent = '[' + ts + '][' + level + '] ' + msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
function clearLog() { document.getElementById('log-box').innerHTML = ''; }
function now() { return new Date().toTimeString().slice(0,8); }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 페이지 로드 시 상태 복원 ─────────────────────
$(document).ready(function() {
  command('get_status', '', '', '', {}, function(ret) {
    if (!ret || ret.ret !== 'success') return;
    if (ret.is_running) {
      setBadge(true);
      setButtons(true);
      $('#progress-wrap').show();
    }
    if (ret.progress) updateProgress(ret.progress);
    if (ret.logs && ret.logs.length) {
      ret.logs.forEach(function(l) { appendLog(l.ts, l.level, l.msg); });
    }
  });
});
</script>
{% endblock %}
